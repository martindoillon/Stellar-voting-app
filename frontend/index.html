<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Voting dApp</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0a0a0a;
        color: #e2e2e2;
        min-height: 100vh;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 2rem;
        border-bottom: 1px solid #1e1e2e;
        background: #0f0f1a;
      }

      header h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: #fff;
      }

      header h1 span {
        color: #6366f1;
      }

      #connectBtn {
        background: #6366f1;
        color: #fff;
        border: none;
        padding: 0.6rem 1.2rem;
        border-radius: 8px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      #connectBtn:hover {
        background: #4f46e5;
      }
      #connectBtn.connected {
        background: #1e1e2e;
        border: 1px solid #333;
      }

      .container {
        max-width: 640px;
        margin: 0 auto;
        padding: 1.5rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .card {
        background: #1a1a2e;
        border: 1px solid #252540;
        border-radius: 12px;
        padding: 1.25rem;
      }

      .card h2 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: #fff;
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.85rem;
      }

      .status-row .label {
        color: #888;
      }

      .status-row .value {
        font-family: "SF Mono", "Fira Code", monospace;
        color: #a5b4fc;
      }

      .network-badge {
        display: inline-block;
        background: #1e3a2f;
        color: #4ade80;
        font-size: 0.75rem;
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        font-weight: 500;
      }

      label {
        display: block;
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 0.3rem;
      }

      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 0.65rem 0.75rem;
        border: 1px solid #333;
        border-radius: 8px;
        background: #0f0f1a;
        color: #fff;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: #6366f1;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.6rem 1.2rem;
        border: none;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.2s,
          opacity 0.2s;
      }

      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .btn-primary {
        background: #6366f1;
        color: #fff;
      }
      .btn-primary:hover:not(:disabled) {
        background: #4f46e5;
      }

      .btn-yes {
        background: #166534;
        color: #fff;
      }
      .btn-yes:hover:not(:disabled) {
        background: #15803d;
      }

      .btn-no {
        background: #7f1d1d;
        color: #fff;
      }
      .btn-no:hover:not(:disabled) {
        background: #991b1b;
      }

      .btn-group {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }

      .form-group {
        margin-bottom: 0.75rem;
      }

      .proposal-info {
        background: #0f0f1a;
        border: 1px solid #252540;
        border-radius: 8px;
        padding: 1rem;
        margin-top: 0.75rem;
        display: none;
      }

      .proposal-info.visible {
        display: block;
      }

      .proposal-title {
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        margin-bottom: 0.5rem;
      }

      .vote-bar {
        display: flex;
        height: 8px;
        border-radius: 4px;
        overflow: hidden;
        background: #252540;
        margin: 0.5rem 0;
      }

      .vote-bar .yes {
        background: #4ade80;
      }
      .vote-bar .no {
        background: #f87171;
      }

      .vote-counts {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        color: #888;
      }

      .vote-counts .yes-count {
        color: #4ade80;
      }
      .vote-counts .no-count {
        color: #f87171;
      }

      .badge-active {
        display: inline-block;
        font-size: 0.7rem;
        padding: 0.15rem 0.5rem;
        border-radius: 20px;
        font-weight: 500;
      }

      .badge-active.open {
        background: #1e3a2f;
        color: #4ade80;
      }
      .badge-active.closed {
        background: #3b1a1a;
        color: #f87171;
      }

      #resultArea {
        min-height: 2.5rem;
        display: flex;
        align-items: center;
        font-size: 0.85rem;
      }

      .result-msg {
        padding: 0.6rem 0.8rem;
        border-radius: 8px;
        width: 100%;
        word-break: break-all;
      }

      .result-msg.success {
        background: #0d2818;
        color: #4ade80;
      }
      .result-msg.error {
        background: #2d1215;
        color: #f87171;
      }
      .result-msg.loading {
        background: #1a1a2e;
        color: #a5b4fc;
      }

      .result-msg a {
        color: #818cf8;
        text-decoration: none;
      }
      .result-msg a:hover {
        text-decoration: underline;
      }

      @media (max-width: 480px) {
        header {
          padding: 0.75rem 1rem;
        }
        .container {
          padding: 1rem 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1><span>Stellar</span> Voting dApp</h1>
      <button id="connectBtn">Connect Wallet</button>
    </header>

    <div class="container">
      <div class="card">
        <div class="status-row">
          <span class="label">Wallet</span>
          <span class="value" id="walletDisplay">Not connected</span>
        </div>
        <div class="status-row" style="margin-top: 0.5rem">
          <span class="label">Network</span>
          <span class="network-badge">Testnet</span>
        </div>
      </div>

      <div class="card">
        <h2>Create Proposal</h2>
        <div class="form-group">
          <label for="proposalTitle">Title</label>
          <input
            type="text"
            id="proposalTitle"
            placeholder="e.g. Add a gym to campus"
          />
        </div>
        <button class="btn btn-primary" id="createBtn">Create</button>
      </div>

      <div class="card">
        <h2>Vote on Proposal</h2>
        <div class="form-group">
          <label for="proposalId">Proposal ID</label>
          <input type="number" id="proposalId" placeholder="1" min="1" />
        </div>
        <button
          class="btn btn-primary"
          id="loadBtn"
          style="font-size: 0.8rem; padding: 0.4rem 0.8rem"
        >
          Load Proposal
        </button>

        <div class="proposal-info" id="proposalInfo">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
            "
          >
            <span class="proposal-title" id="pTitle"></span>
            <span class="badge-active" id="pStatus"></span>
          </div>
          <div class="vote-bar">
            <div class="yes" id="yesBar"></div>
            <div class="no" id="noBar"></div>
          </div>
          <div class="vote-counts">
            <span class="yes-count" id="yesCount"></span>
            <span class="no-count" id="noCount"></span>
          </div>
          <div class="btn-group">
            <button class="btn btn-yes" id="voteYesBtn">Vote Yes</button>
            <button class="btn btn-no" id="voteNoBtn">Vote No</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Result</h2>
        <div id="resultArea">
          <span style="color: #555; font-size: 0.85rem"
            >Waiting for transaction...</span
          >
        </div>
      </div>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
